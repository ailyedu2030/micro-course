<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<style>
*{box-sizing:border-box;margin:0}
html,body{width:100%;height:100%;overflow:hidden;font-family:-apple-system,'Helvetica Neue',system-ui,sans-serif;background:#0d0d12;color:#f0eee9;display:flex;align-items:center;justify-content:center}
.slide{width:100%;height:100%;padding:6% 7%;display:flex;flex-direction:column;position:relative;background:radial-gradient(ellipse 80% 60% at 20% 30%,rgba(120,80,200,0.08),transparent),radial-gradient(ellipse 60% 50% at 80% 70%,rgba(245,158,11,0.05),transparent),#0d0d12}
/* 装饰线 */
.slide::before{content:'';position:absolute;top:0;left:7%;right:7%;height:1px;background:linear-gradient(90deg,transparent,rgba(245,158,11,0.3),rgba(120,80,200,0.3),transparent)}
/* 顶栏 */
.top{display:flex;align-items:center;gap:8px;margin-bottom:4%;flex-shrink:0}
.top .num{font-size:clamp(10px,1vw,12px);font-weight:500;color:rgba(240,238,233,0.35);letter-spacing:0.5px}
.top .tag{padding:2px 8px;border-radius:4px;background:rgba(245,158,11,0.12);color:#f5a623;font-size:clamp(8px,0.8vw,10px);font-weight:600;letter-spacing:0.3px;text-transform:uppercase}
/* 标题区 */
h1{font-size:clamp(22px,3.5vw,38px);font-weight:500;letter-spacing:-0.03em;line-height:1.15;margin-bottom:1%;color:#f0eee9}
h1 em{font-style:normal;color:#f5a623;font-weight:400}
.sub{font-size:clamp(12px,1.4vw,15px);font-weight:400;color:rgba(240,238,233,0.5);line-height:1.6;margin-bottom:5%;flex-shrink:0}
/* 内容区：左右双栏 */
.content{flex:1;display:flex;gap:5%;min-height:0}
/* 左栏：代码 */
.left{flex:1;display:flex;flex-direction:column}
.code-box{flex:1;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:8px;overflow:hidden;display:flex;flex-direction:column;backdrop-filter:blur(2px)}
.code-hdr{display:flex;align-items:center;justify-content:space-between;padding:0 14px;height:clamp(30px,3.5vh,38px);border-bottom:1px solid rgba(255,255,255,0.04);flex-shrink:0}
.code-hdr .lbl{font-size:clamp(8px,0.8vw,11px);font-weight:500;color:rgba(240,238,233,0.3);letter-spacing:0.5px;text-transform:uppercase}
.code-hdr .lbl span{color:rgba(245,158,11,0.7)}
.code-body{flex:1;padding:3% 4%;overflow-y:auto}
.code-body pre{font-family:ui-monospace,'SF Mono','JetBrains Mono','Consolas',monospace;font-size:clamp(11px,1.3vw,13.5px);line-height:1.85;color:rgba(240,238,233,0.85);white-space:pre-wrap;letter-spacing:0.1px}
.code-body pre .hl{color:#f5a623}
.code-body pre .dim{color:rgba(240,238,233,0.25)}
.code-body pre .cm{color:rgba(240,238,233,0.18);font-style:italic}
/* 右栏：操作面板 */
.right{width:clamp(120px,16vw,200px);display:flex;flex-direction:column;gap:10px;flex-shrink:0}
.action-card{background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.06);border-radius:8px;padding:14px;display:flex;flex-direction:column;align-items:center;gap:8px;text-align:center}
.action-card .icon{width:clamp(28px,3vw,36px);height:clamp(28px,3vw,36px);border-radius:8px;background:rgba(245,158,11,0.1);display:flex;align-items:center;justify-content:center}
.action-card .icon svg{width:clamp(14px,1.5vw,18px);height:clamp(14px,1.5vw,18px);color:#f5a623}
.action-card .albl{font-size:clamp(9px,0.9vw,12px);font-weight:500;color:rgba(240,238,233,0.6);line-height:1.3}
.btn-cpy{width:100%;padding:8px 0;border:none;border-radius:6px;background:#f5a623;color:#0d0d12;font-size:clamp(10px,1vw,13px);font-weight:600;font-family:inherit;cursor:pointer;transition:all .15s}
.btn-cpy:hover{background:#e09515;transform:translateY(-1px)}
.btn-cpy.done{background:#22c55e;color:#fff}
/* 底栏 */
.btm{display:flex;justify-content:space-between;align-items:center;margin-top:3%;font-size:clamp(9px,1vw,12px);color:rgba(240,238,233,0.25);flex-shrink:0}
.btm .nav{display:flex;gap:3px}
.btm .nav button{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:4px;color:rgba(240,238,233,0.4);padding:3px 10px;font-size:clamp(9px,0.9vw,11px);font-family:inherit;cursor:pointer;transition:all .15s}
.btm .nav button:hover{background:rgba(245,158,11,0.1);border-color:rgba(245,158,11,0.2);color:#f5a623}
.btm .nav button:disabled{opacity:0.2;cursor:default;pointer-events:none}
</style></head><body><div class="slide" id="app"></div>
<script>
var T=[{n:"数据概况模板",t:"描述统计",s:"拿到新数据，让AI 30秒告诉你整体情况。",p:'你是一个数据分析师。请对以下数据做完整的描述性统计：\n\n<span class="dim">①</span> 每列的数据类型和缺失值数量\n<span class="dim">②</span> 数值列的均值、中位数、标准差、四分位数\n<span class="dim">③</span> 分类列的频数分布\n<span class="dim">④</span> <span class="hl">初步判断</span>：哪些字段值得进一步分析'},
{n:"比较分析模板",t:"对比分析",s:"对比两组数据或两个时间段的差异。",p:'你是一个商业分析师。请对以下数据做比较分析：\n\n<span class="dim">①</span> 按 <span class="hl">[分组字段]</span> 将数据分为两组\n<span class="dim">②</span> 对比两组的均值、中位数、标准差\n<span class="dim">③</span> 做统计检验，输出p值\n<span class="dim">④</span> 用一句话概括核心差异'},
{n:"趋势分析模板",t:"时间序列",s:"看某个指标随时间的变化趋势。",p:'你是一个数据分析师。请对以下数据做趋势分析：\n\n<span class="dim">①</span> 按时间维度（日/周/月）聚合数据\n<span class="dim">②</span> 计算环比和同比增长率\n<span class="dim">③</span> 识别显著的峰值和谷值\n<span class="dim">④</span> 用一句话概括核心趋势'},
{n:"占比分析模板",t:"构成分析",s:"看各个部分在整体中的占比。",p:'你是一个数据分析师。请对以下数据做占比分析：\n\n<span class="dim">①</span> 按分类字段分组，计算数量与占比\n<span class="dim">②</span> 从高到低排序，计算累计占比\n<span class="dim">③</span> 识别贡献80%的核心类别（<span class="hl">帕累托分析</span>）\n<span class="dim">④</span> 输出可视化方案'},
{n:"相关性分析模板",t:"关联挖掘",s:"看两个变量之间有没有关系。",p:'你是一个数据分析师。请对以下数据做相关性分析：\n\n<span class="dim">①</span> 计算所有数值列的相关系数矩阵\n<span class="dim">②</span> 标记 |r| >= 0.5 的强相关对\n<span class="dim">③</span> 对最强相关对做散点图描述\n<span class="dim">④</span> <span class="hl">警示</span>：相关性不等于因果'},
{n:"异常检测模板",t:"离群识别",s:"找数据中的异常值和离群点。",p:'你是一个数据分析师。请对以下数据做异常检测：\n\n<span class="dim">①</span> 用 <span class="hl">IQR</span> 方法标记异常值\n<span class="dim">②</span> 用 <span class="hl">3sigma</span> 方法标记异常值\n<span class="dim">③</span> 输出两种方法都标记的数据点\n<span class="dim">④</span> 对每个异常点给出业务解释'},
{n:"预测模板",t:"趋势预测",s:"根据历史数据预测未来的趋势。",p:'你是一个数据分析师。请对以下数据做预测：\n\n<span class="dim">①</span> 分析历史趋势和季节性模式\n<span class="dim">②</span> 选择适合的预测方法\n<span class="dim">③</span> 预测未来3个周期\n<span class="dim">④</span> 输出预测值和置信区间\n<span class="dim">⑤</span> 评估 <span class="hl">可信度(1-10分)</span>'},
{n:"报告生成模板",t:"报告输出",s:"把分析结果写成一份完整的报告。",p:'你是一个商业分析师。请生成一份完整的分析报告：\n\n<span class="dim">①</span> 执行摘要（3句话以内）\n<span class="dim">②</span> 分析背景与目的\n<span class="dim">③</span> 数据来源与处理方法\n<span class="dim">④</span> <span class="hl">核心发现</span>（3-5条，每条配数据证据）\n<span class="dim">⑤</span> 结论与行动建议\n<span class="dim">⑥</span> 附录：技术细节'}];
var ci=0;
function r(i){
  ci=i=Math.max(0,Math.min(T.length-1,i));
  var t=T[ci];
  document.getElementById('app').innerHTML=
    '<div class="top"><span class="tag">'+t.t+'</span><span class="num">'+(i+1)+' / '+T.length+'</span></div>'+
    '<h1>'+t.n+'</h1><p class="sub">'+t.s+'</p>'+
    '<div class="content"><div class="left"><div class="code-box"><div class="code-hdr"><span class="lbl">Prompt 模板 · 粘贴到 <span>OpenCode</span></span></div><div class="code-body"><pre>'+t.p+'</pre></div></div></div>'+
    '<div class="right"><div class="action-card"><div class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></div><span class="albl">一键复制模板</span><button class="btn-cpy" id="cpy">复制</button></div></div></div>'+
    '<div class="btm"><div class="nav"><button onclick="r('+(i-1)+')"'+((i<=0)?' disabled':'')+'><kbd>←</kbd> 上一个</button><button onclick="r('+(i+1)+')"'+((i>=T.length-1)?' disabled':'')+'>下一个 <kbd>→</kbd></button></div><span>'+t.n+'</span></div>';
  document.getElementById('cpy').onclick=cp;
}
function cp(){
  var t=T[ci].p.replace(/<[^>]*>/g,'');
  var ta=document.createElement('textarea');ta.value=t;ta.style.position='fixed';ta.style.left='-9999px';
  document.body.appendChild(ta);ta.select();
  try{document.execCommand('copy');var b=document.getElementById('cpy');b.textContent='已复制!';b.classList.add('done');setTimeout(function(){b.textContent='复制';b.classList.remove('done')},2000)}catch(e){}
  document.body.removeChild(ta);
}
r(0);
</script></body></html>
