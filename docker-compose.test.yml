# 微课管理平台 · 测试环境
# 用独立端口避免与开发环境冲突
# 启动: docker compose -f docker-compose.test.yml up -d
# 运行测试: cd micro-course-api && mvn test -Dspring.profiles.active=test
version: '3.8'
services:
  postgres-test:
    image: postgres:17
    container_name: microcourse-pg-test
    environment:
      POSTGRES_DB: micro_course_test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
  
  redis-test:
    image: redis:7
    container_name: microcourse-redis-test
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
