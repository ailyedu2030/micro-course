# 微课管理平台 · 测试环境容器
# PostgreSQL 17 + Redis 7
# 用法: docker compose -f docker-compose.test.yml up -d

services:
  postgres-test:
    image: postgres:17-alpine
    container_name: microcourse-pg-test
    environment:
      POSTGRES_DB: micro_course_test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    tmpfs: /var/lib/postgresql/data

  redis-test:
    image: redis:7-alpine
    container_name: microcourse-redis-test
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
