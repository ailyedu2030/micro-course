name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend Build & Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: micro_course_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5433:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:7
        ports:
          - 6380:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17 (temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: maven-

      - name: Compile backend
        run: cd micro-course-api && mvn compile -q

      - name: Run integration tests (experimental)
        continue-on-error: true
        run: cd micro-course-api && mvn test -Dspring.profiles.active=test

      - name: Save test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: micro-course-api/target/surefire-reports/
          retention-days: 7

  frontend:
    name: Frontend Build & Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: micro-course-admin/package-lock.json

      - name: Install dependencies
        run: cd micro-course-admin && npm ci

      - name: Build frontend
        run: cd micro-course-admin && npm run build

  precheck:
    name: Contract Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run precheck
        run: bash .claude/skills/microcourse/scripts/precheck.sh
