name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: micro_course
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Wait for PostgreSQL & Redis
        run: |
          for i in $(seq 1 30); do
            pg_isready -h localhost -p 5432 && echo "PG ready" && break
            sleep 2
          done
          for i in $(seq 1 15); do
            redis-cli -h localhost -p 6379 ping && echo "Redis ready" && break
            sleep 2
          done

      - name: Cache Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Backend Test
        run: mvn -B verify
        working-directory: ./micro-course-api
        env:
          TEST_DB_URL: jdbc:postgresql://localhost:5432/micro_course
          TEST_DB_PASSWORD: postgres
          TEST_REDIS_HOST: localhost
          TEST_REDIS_PORT: 6379

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: micro-course-admin/package-lock.json

      - name: Install & Lint & Build
        run: |
          npm ci
          npm run lint
          npm run build
        working-directory: ./micro-course-admin

  e2e:
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Start PostgreSQL & Redis
        env:
          DB_USERNAME: postgres
          DB_PASSWORD: postgres
        run: |
          export DB_USERNAME DB_PASSWORD
          docker compose -f docker-compose.yml up -d postgres redis
          for i in $(seq 1 60); do
            pg_isready -h localhost -p 5432 -U postgres && echo "PG ready" && break
            sleep 3
          done
          for i in $(seq 1 30); do
            redis-cli -h localhost -p 6379 ping && echo "Redis ready" && break
            sleep 2
          done

      - name: Build API Docker image
        env:
          DB_USERNAME: postgres
          DB_PASSWORD: postgres
          JWT_SECRET: github-actions-test-secret-min-32-chars-long
          JWT_EXPIRATION: 7200000
          JWT_REFRESH_EXPIRATION: 604800000
          CORS_ALLOWED_ORIGINS: http://localhost:80,http://127.0.0.1:80
        run: docker compose -f docker-compose.yml build micro-course-api

      - name: Start API container
        env:
          DB_USERNAME: postgres
          DB_PASSWORD: postgres
          JWT_SECRET: github-actions-test-secret-min-32-chars-long
          JWT_EXPIRATION: 7200000
          JWT_REFRESH_EXPIRATION: 604800000
          CORS_ALLOWED_ORIGINS: http://localhost:80,http://127.0.0.1:80
        run: |
          docker compose -f docker-compose.yml up -d micro-course-api
          for i in $(seq 1 60); do
            curl -sf http://localhost:8080/actuator/health && echo "actuator ready" && break
            sleep 3
          done
          echo "Pre-warm: waiting for API to accept login..."
          for i in $(seq 1 30); do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X POST http://localhost:8080/api/auth/login \
              -H 'Content-Type: application/json' \
              -d '{"username":"admin","password":"admin123"}' 2>/dev/null || echo "000")
            if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "401" ] || [ "$HTTP_CODE" = "400" ]; then
              echo "API pre-warmed (HTTP $HTTP_CODE)"
              break
            fi
            if [ "$i" = "30" ]; then
              echo "API pre-warm FAILED after 30 attempts (last HTTP: $HTTP_CODE)"
              docker compose -f docker-compose.yml logs micro-course-api | tail -20
            fi
            sleep 2
          done

      - name: Run E2E Tests
        run: bash scripts/e2e-test.sh
        env:
          BASE_URL: http://localhost:8080

      - name: Run P1-C Regression E2E
        run: bash scripts/e2e-p1c-backend.sh
        env:
          BASE_URL: http://localhost:8080

      - name: Cleanup
        if: always()
        run: docker compose -f docker-compose.yml down --volumes

  docker:
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Pull base images
        run: docker compose pull

      - name: Build Docker
        run: docker compose build
