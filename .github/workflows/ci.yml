name: CI

on:
  push:
    branches: [main]
    tags: [v*]
  pull_request:
    branches: [main]

jobs:
  precheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run precheck
        run: bash .claude/skills/microcourse/scripts/precheck.sh

  backend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven
      - name: Compile
        run: mvn compile -B
        working-directory: micro-course-api

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: micro-course-admin/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: micro-course-admin
      - name: Build
        run: npm run build
        working-directory: micro-course-admin

  super-fix-gates:
    needs: [precheck, backend-build, frontend-build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: micro-course-admin/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: micro-course-admin
      - name: Convergence Check
        run: bash tools/convergence-check.sh
      - name: Gate Check - Static
        run: bash tools/gate-check.sh PHASE_5_STATIC
      - name: Gate Check - Final
        run: bash tools/gate-check.sh PHASE_7_FINAL

  e2e-tests:
    needs: [backend-build, frontend-build]
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: micro_course
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: change_me
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: micro-course-admin/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: micro-course-admin
      - name: Start backend
        run: |
          mvn spring-boot:run -B &
          sleep 30
        working-directory: micro-course-api
        env:
          DB_URL: jdbc:postgresql://localhost:5432/micro_course
          DB_USERNAME: postgres
          DB_PASSWORD: change_me
          REDIS_HOST: localhost
          JWT_SECRET: ci_test_secret_key_for_github_actions_only_32chr
      - name: Run API smoke tests
        run: bash tools/smoke-test.sh
      - name: Install Playwright
        run: npx playwright install chromium
        working-directory: micro-course-admin
      - name: Run e2e tests
        run: npx playwright test
        working-directory: micro-course-admin
      - name: Run convergence check
        run: bash tools/convergence-check.sh

  docker:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [precheck, backend-build, frontend-build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
      - name: Build and push API
        uses: docker/build-push-action@v6
        with:
          context: micro-course-api
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/api:${{ steps.version.outputs.VERSION }}
            ghcr.io/${{ github.repository }}/api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build and push Admin
        uses: docker/build-push-action@v6
        with:
          context: micro-course-admin
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/admin:${{ steps.version.outputs.VERSION }}
            ghcr.io/${{ github.repository }}/admin:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
