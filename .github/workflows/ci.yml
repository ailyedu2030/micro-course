name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  JWT_SECRET: ci-jwt-secret-key-min-32-bytes-for-hamc!!
  VIDEO_SIGN_SECRET: ci-video-sign-secret-key-32-bytes
  DB_USERNAME: postgres
  DB_PASSWORD: postgres
  REDIS_PASSWORD: ""

jobs:
  # ============================================================================
  # 后端 CI
  # ============================================================================
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: micro_course
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Backend compile
        run: mvn compile -q
        working-directory: micro-course-api

      - name: Backend test
        run: mvn test -B
        working-directory: micro-course-api

      - name: JaCoCo coverage check
        run: mvn verify -B -DskipTests
        working-directory: micro-course-api

      - name: Precheck
        run: bash .claude/skills/microcourse/scripts/precheck.sh

      - name: Package JAR
        run: mvn package -DskipTests -B
        working-directory: micro-course-api

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: micro-course-api/target/*.jar
          retention-days: 7

  # ============================================================================
  # 前端 CI
  # ============================================================================
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: micro-course-admin/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: micro-course-admin

      - name: Lint check
        run: npx eslint --ext .vue,.js src/ || echo "Lint warnings (non-blocking)"
        working-directory: micro-course-admin
        continue-on-error: true

      - name: Build
        run: npm run build
        working-directory: micro-course-admin

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: micro-course-admin/dist
          retention-days: 7

  # ============================================================================
  # Docker 构建（仅 main 分支）
  # ============================================================================
  docker:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
        continue-on-error: true

      - name: Docker meta - backend
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME || 'microcourse' }}/api
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,prefix=

      - name: Docker meta - frontend
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME || 'microcourse' }}/admin
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,prefix=

      - name: Build & push backend image
        uses: docker/build-push-action@v6
        with:
          context: micro-course-api
          push: ${{ secrets.DOCKER_USERNAME != '' }}
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend image
        uses: docker/build-push-action@v6
        with:
          context: micro-course-admin
          push: ${{ secrets.DOCKER_USERNAME != '' }}
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
