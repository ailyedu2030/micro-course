name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  JWT_SECRET: ci-jwt-secret-key-min-32-bytes-for-hamc!!
  VIDEO_SIGN_SECRET: ci-video-sign-secret-key-32-bytes
  DB_USERNAME: postgres
  DB_PASSWORD: postgres
  REDIS_PASSWORD: ""
  DEEPSEEK_API_KEY: test-key-not-used-in-ci
  TEST_DB_URL: jdbc:postgresql://localhost:5432/micro_course
  TEST_REDIS_HOST: localhost
  TEST_REDIS_PORT: 6379

jobs:
  # ============================================================================
  # 后端 CI
  # ============================================================================
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: micro_course
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6

      - name: Setup JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Backend compile
        run: mvn compile -q
        working-directory: micro-course-api

      - name: Backend test
        run: mvn test -B
        working-directory: micro-course-api

      - name: JaCoCo coverage check
        run: mvn verify -B -DskipTests
        working-directory: micro-course-api

      - name: Precheck (v1.7.0 字段契约 14 项)
        run: bash .claude/skills/microcourse/scripts/precheck.sh
        # P2-4: 去掉 continue-on-error，precheck 失败直接阻塞 PR
        # 之前因 set -e 与 bash 版本差异静默失败 — 已修（v1.7.0 precheck.sh 移除 set -e）

      - name: Package JAR
        run: mvn package -DskipTests -B
        working-directory: micro-course-api

      # ★ v1.7.0: 启动后端服务, e2e 测试需要
      - name: Start backend (background)
        run: |
          java -jar target/micro-course-api-1.0.0.jar &
          BACKEND_PID=$!
          echo "BACKEND_PID=$BACKEND_PID" >> $GITHUB_ENV
          # 等待启动
          for i in {1..30}; do
            if curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/api/auth/login -X POST -H "Content-Type: application/json" -d '{"username":"admin","password":"admin123"}' | grep -q 200; then
              echo "Backend ready after ${i}s"
              break
            fi
            sleep 1
          done
        working-directory: micro-course-api

      - name: Upload JAR
        uses: actions/upload-artifact@v5
        continue-on-error: true
        with:
          name: backend-jar
          path: micro-course-api/target/*.jar
          retention-days: 7

  # ============================================================================
  # 前端 CI
  # ============================================================================
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: micro-course-admin/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: micro-course-admin

      - name: Lint check
        run: npx eslint --ext .vue,.js src/ || echo "Lint warnings (non-blocking)"
        working-directory: micro-course-admin
        continue-on-error: true

      - name: Build
        run: npm run build
        working-directory: micro-course-admin

      - name: Upload dist
        uses: actions/upload-artifact@v5
        continue-on-error: true
        with:
          name: frontend-dist
          path: micro-course-admin/dist
          retention-days: 7

  # ============================================================================
  # v1.7.0: 端到端测试 (Playwright)
  # ============================================================================
  e2e:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: micro_course
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      JWT_SECRET: ci-jwt-secret-key-min-32-bytes-for-hamc!!
      VIDEO_SIGN_SECRET: ci-video-sign-secret-key-32-bytes
      DB_URL: jdbc:postgresql://localhost:5432/micro_course
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      REDIS_PASSWORD: ""
      CORS_ALLOWED_ORIGINS: http://localhost:5173
      PAY_MODE: mock
    steps:
      - uses: actions/checkout@v6

      # v1.7.1 真正根因修复: artifact quota 满时 download 不可靠
      # 直接本地 mvn package 构建 JAR (不依赖 artifact)
      - name: Build backend JAR
        run: mvn package -DskipTests -B -q
        working-directory: micro-course-api
        timeout-minutes: 5

      - name: Setup JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      # e2e 自己跑 vite dev, 不需要 frontend dist

      - name: Setup JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install Playwright
        run: |
          npm ci
          npx playwright install --with-deps chromium
        working-directory: micro-course-admin

      - name: Start services
        run: |
          # ===== v1.7.0 e2e 启动顺序 (Round 2 优化) =====
          # 1. 启动 backend (Flyway 创建所有 schema, V1-V89 migrations)
          # 2. 等待 backend ready
          # 3. TRUNCATE 所有表 CASCADE (清空数据,保留 schema + reset sequences)
          # 4. 加载 test_data.sql (此时所有表已存在)
          # 5. 同步 PostgreSQL sequences (确保 MAX(id) 与 sequence 一致)
          # 6. 清 Redis 缓存 (banner 等)
          # 7. 启动前端 (vite dev)
          #
          # Round 1 失败原因 (CI run 28134906354):
          #   test_data.sql 在 backend 启动前执行,引用 V15+ 创建的表 (learning_progress 等)
          #   → 整个 transaction aborted → 所有 INSERT 失败
          #
          # Round 2 修复 (CI run 28136039320):
          #   backend 启动 → Flyway → kill backend → test_data.sql → 重启 backend
          #   但 kill 触发 SIGTERM (exit code 143) → 整个 shell 退出 → Start services 失败
          #
          # Round 3 最终方案 (本版本):
          #   backend 启动 → Flyway → TRUNCATE (不清 schema, 不杀 backend) → test_data.sql
          #   优势: 不杀 backend (避免 SIGTERM),不重置 schema (sequence 由 TRUNCATE...RESTART
          #         IDENTITY 自动重置 1, 然后 load test_data.sql 用显式 ID 1..N, 再 sequence sync)

          # 1. 启动 backend (Flyway 跑 V1-V89)
          cd micro-course-api
          java -jar target/micro-course-api-1.0.0.jar > /tmp/backend.log 2>&1 &
          cd ..
          # 2. 等待 backend ready (确保 Flyway 完成)
          for i in {1..90}; do
            if curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/api/auth/login -X POST -H "Content-Type: application/json" -d '{"username":"admin","password":"admin123"}' | grep -q 200; then
              echo "Backend ready after ${i}s (Flyway migrations applied)"
              break
            fi
            sleep 1
          done

          # 3. TRUNCATE 所有表 (清数据,保留 schema,RESTART IDENTITY 重置 sequence)
          PGPASSWORD=postgres psql -h localhost -U postgres -d micro_course -v ON_ERROR_STOP=1 <<'SQL' >/dev/null
          DO $$
          DECLARE r RECORD;
          BEGIN
              FOR r IN (SELECT tablename FROM pg_tables WHERE schemaname = 'public' ORDER BY tablename) LOOP
                  EXECUTE format('TRUNCATE TABLE public.%I RESTART IDENTITY CASCADE', r.tablename);
              END LOOP;
          END $$;
          SQL
          echo "=== Tables truncated, sequences reset ==="

          # 4. 加载测试数据 (所有表已存在)
          PGPASSWORD=postgres psql -h localhost -U postgres -d micro_course \
            -f test_data.sql 2>&1 | tail -10
          # 5. 同步 PostgreSQL sequences (test_data.sql 用显式 ID, setval 到 MAX(id))
          PGPASSWORD=postgres psql -h localhost -U postgres -d micro_course -v ON_ERROR_STOP=1 <<'SQL' >/dev/null
          DO $$
          DECLARE
              r record;
          BEGIN
              FOR r IN
                  SELECT
                      table_schema, table_name, column_name,
                      pg_get_serial_sequence(format('%I.%I', table_schema, table_name), column_name) AS seq
                  FROM information_schema.columns
                  WHERE table_schema = 'public'
                    AND column_default LIKE 'nextval%'
              LOOP
                  EXECUTE format('SELECT setval(%L, COALESCE((SELECT MAX(%I) FROM %I.%I), 1))',
                      r.seq, r.column_name, r.table_schema, r.table_name);
              END LOOP;
          END $$;
          SQL
          echo "=== Seed loaded + sequences synced ==="
          # 诊断: 验证 test_data.sql 实际加载的 student 密码 hash
          PGPASSWORD=postgres psql -h localhost -U postgres -d micro_course -c "SELECT id, username, substring(password, 1, 30) AS password_prefix, status FROM users WHERE username IN ('admin', 'teacher', 'student') ORDER BY id"

          # 6. 清 Redis 登录失败计数器 + banner 缓存
          #    AuthServiceImpl.login() 有防暴: 同 username 5 次失败 → 账号锁定 (LOGIN_LOCKED)
          #    e2e 测试如 UI login 失败 5 次 → 后续 API login 失败 → 测试失败
          #    每次 CI run 开始清 Redis 计数器 + 旧 banner cache
          #    apt-get install redis-tools 一次,后续用 redis-cli (比 Python RESP 协议稳定)
          sudo apt-get install -y redis-tools > /dev/null 2>&1 || apt-get install -y redis-tools > /dev/null 2>&1 || true
          redis-cli -h localhost FLUSHDB
          echo "=== Redis FLUSHDB done ==="

          # 7. 启动前端 (vite dev 而非 preview, dev 内置 /api 代理 → backend:8080)
          cd micro-course-admin
          npx vite --port 5173 --host 0.0.0.0 > /tmp/frontend.log 2>&1 &
          cd ..
          # 8. 等待 frontend ready (backend 已经在运行)
          sleep 3
          for i in {1..30}; do
            if curl -s -o /dev/null -w "%{http_code}" http://localhost:5173/ | grep -q 200; then
              echo "Frontend ready after ${i}s"
              break
            fi
            sleep 1
          done
          # 9. 验证 backend 仍可用 (TRUNCATE 后连接池可能要重建)
          for i in {1..10}; do
            if curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/api/auth/login -X POST -H "Content-Type: application/json" -d '{"username":"admin","password":"admin123"}' | grep -q 200; then
              echo "Backend verified after truncate"
              break
            fi
            sleep 1
          done

      - name: Run e2e tests (v1.7.0 37 项)
        working-directory: micro-course-admin
        run: |
          PLAYWRIGHT_CONFIG=e2e/playwright.config.js \
            npx playwright test \
            e2e/smoke-test.spec.js \
            e2e/security-password-change.spec.js \
            --reporter=list

      - name: Upload e2e results
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-report
          path: micro-course-admin/playwright-report
          retention-days: 7

      - name: Upload backend log (debug)
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: e2e-backend-log
          path: /tmp/backend.log
          retention-days: 7
          if-no-files-found: ignore

  # ============================================================================
  # v1.7.0: 部署前 Dry-Run 检查
  # ============================================================================
  deploy-dryrun:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [backend, frontend, e2e]
    steps:
      - uses: actions/checkout@v6

      - name: Setup JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client redis-tools

      - name: Setup PostgreSQL service
        run: |
          docker run -d --name pg-dryrun \
            -e POSTGRES_USER=postgres \
            -e POSTGRES_PASSWORD=postgres \
            -e POSTGRES_DB=micro_course \
            -p 5432:5432 \
            postgres:17
          # 等待 PG ready
          for i in {1..30}; do
            if PGPASSWORD=postgres psql -h localhost -U postgres -d micro_course -c 'SELECT 1' >/dev/null 2>&1; then
              echo "PostgreSQL ready after ${i}s"
              break
            fi
            sleep 1
          done

      - name: Setup Redis service
        run: |
          docker run -d --name redis-dryrun \
            -p 6379:6379 \
            redis:7
          # 等待 Redis ready
          for i in {1..30}; do
            if redis-cli ping >/dev/null 2>&1; then
              echo "Redis ready after ${i}s"
              break
            fi
            sleep 1
          done

      - name: Start backend
        run: |
          cd micro-course-api
          mvn package -DskipTests -q
          java -jar target/micro-course-api-1.0.0.jar > /tmp/backend.log 2>&1 &
          # 等待就绪
          for i in {1..30}; do
            if curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/api/auth/login -X POST -H "Content-Type: application/json" -d '{"username":"admin","password":"admin123"}' | grep -q 200; then
              echo "Backend ready after ${i}s"
              break
            fi
            sleep 1
          done

      - name: Setup .env for dry-run
        run: cp .env.example .env

      - name: Run deploy dry-run
        run: bash scripts/deploy-dryrun.sh || true
        continue-on-error: true

  # ============================================================================
  # Docker 构建（仅 main 分支）
  # ============================================================================
  docker:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
        continue-on-error: true

      - name: Docker meta - backend
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME || 'microcourse' }}/api
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,prefix=

      - name: Docker meta - frontend
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME || 'microcourse' }}/admin
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,prefix=

      - name: Build & push backend image
        uses: docker/build-push-action@v6
        with:
          context: micro-course-api
          push: ${{ secrets.DOCKER_USERNAME != '' }}
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend image
        uses: docker/build-push-action@v6
        with:
          context: micro-course-admin
          push: ${{ secrets.DOCKER_USERNAME != '' }}
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
