name: Auto Approve

# 由 GitHub App (microcourse-pr-bot) 代为 approve owner 自提的 PR
# 解决 GitHub 平台硬限制：PR 作者无法 approve 自己的 PR
#
# 触发: owner (ailyedu2030) 创建/更新 PR 时
# 流程: CI 全部通过 → Bot 自动 approve → owner 可正常 merge
#
# 对应 AGENTS.md Step 5.1 路径 B (分级自审)

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  checks: read       # 查询 CI 状态
  pull-requests: read # 读取 PR metadata

jobs:
  auto-approve:
    runs-on: ubuntu-latest
    # 仅处理 owner (ailyedu2030) 自提的 PR
    if: github.event.pull_request.user.login == 'ailyedu2030'
    # 30 分钟总超时，防止 CI 假死后 Bot 长期挂起（即使 bash 内部 10 分钟超时，外层 job 也需兜底）
    timeout-minutes: 30
    steps:
      - name: Generate Bot Token
        id: bot-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_PRIVATE_KEY }}

      - name: Wait for CI to pass
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          EXPECTED_CHECKS="backend frontend e2e docker monitoring-lint"
          MAX_WAIT=600  # 10 minute timeout
          INTERVAL=15
          ELAPSED=0

          while [ $ELAPSED -lt $MAX_WAIT ]; do
            ALL_READY=true
            for check in $EXPECTED_CHECKS; do
              CONCLUSION=$(gh api "repos/$GH_REPO/commits/$HEAD_SHA/check-runs" \
                --jq ".check_runs[] | select(.name == \"$check\") | .conclusion" 2>/dev/null || echo "null")
              STATUS=$(gh api "repos/$GH_REPO/commits/$HEAD_SHA/check-runs" \
                --jq ".check_runs[] | select(.name == \"$check\") | .status" 2>/dev/null || echo "null")

              if [ "$CONCLUSION" = "null" ] || [ "$CONCLUSION" = "" ]; then
                echo "[${ELAPSED}s] $check: not started"
                ALL_READY=false
              elif [ "$CONCLUSION" = "failure" ] || [ "$CONCLUSION" = "timed_out" ] || [ "$CONCLUSION" = "cancelled" ]; then
                echo "::error::$check failed with conclusion=$CONCLUSION — aborting auto-approve"
                exit 1
              elif [ "$CONCLUSION" = "success" ] || [ "$CONCLUSION" = "skipped" ] || [ "$CONCLUSION" = "neutral" ]; then
                echo "[${ELAPSED}s] $check: $CONCLUSION ✓"
              else
                echo "[${ELAPSED}s] $check: $STATUS (waiting...)"
                ALL_READY=false
              fi
            done

            if $ALL_READY; then
              echo "==> All CI checks passed after ${ELAPSED}s"
              break
            fi

            sleep $INTERVAL
            ELAPSED=$((ELAPSED + INTERVAL))
          done

          if [ $ELAPSED -ge $MAX_WAIT ]; then
            echo "::error::CI checks did not pass within ${MAX_WAIT}s timeout"
            exit 1
          fi

      - name: Approve PR
        env:
          GH_TOKEN: ${{ steps.bot-token.outputs.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh pr review ${{ github.event.pull_request.number }} --approve \
            --body "✅ CI 通过 — Bot 自动 approve（AGENTS.md 路径 B：owner 自提 PR 分级自审）"
