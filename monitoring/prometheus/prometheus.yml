global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

# W35 治理: AlertManager 集成 (告警转发)
alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']
      timeout: 10s
      path_prefix: /

rule_files:
  - "/etc/prometheus/alerts.yml"

scrape_configs:
  - job_name: 'micro-course-api'
    metrics_path: '/actuator/prometheus'
    scrape_interval: 10s
    static_configs:
      - targets: ['host.docker.internal:8080']
        labels:
          service: 'micro-course-api'
          tier: 'backend'

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
        labels:
          component: 'host'

  - job_name: 'postgres-exporter'
    static_configs:
      - targets: ['postgres-exporter:9187']
        labels:
          component: 'postgres'

  - job_name: 'redis-exporter'
    static_configs:
      - targets: ['redis-exporter:9121']
        labels:
          component: 'redis'
