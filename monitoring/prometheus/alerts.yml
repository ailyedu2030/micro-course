groups:
  - name: micro-course-api.alerts
    rules:
      # ═══════════════════════════════════════════════
      # P0 · 严重告警 (1h SLA) — 核心服务不可用
      # ═══════════════════════════════════════════════

      - alert: ApiDown
        expr: up{job="micro-course-api"} == 0
        for: 1m
        labels:
          severity: critical
          priority: P0
          tier: backend
        annotations:
          summary: "API 服务不可用"
          description: "micro-course-api 实例 {{ $labels.instance }} 已 down，持续 1 分钟以上。"

      - alert: PostgresDown
        expr: up{job="postgres-exporter"} == 0
        for: 1m
        labels:
          severity: critical
          priority: P0
          tier: database
        annotations:
          summary: "PostgreSQL 不可用"
          description: "PostgreSQL 实例无法连接，持续 1 分钟以上。"

      - alert: RedisDown
        expr: up{job="redis-exporter"} == 0
        for: 1m
        labels:
          severity: critical
          priority: P0
          tier: cache
        annotations:
          summary: "Redis 不可用"
          description: "Redis 实例无法连接，持续 1 分钟以上。"

      # ═══════════════════════════════════════════════
      # P1 · 警告 (2h SLA) — 资源濒临耗尽
      # ═══════════════════════════════════════════════

      - alert: HighErrorRate
        expr: rate(http_server_requests_seconds_count{status=~"5.."}[5m]) / rate(http_server_requests_seconds_count[5m]) > 0.05
        for: 5m
        labels:
          severity: warning
          priority: P1
          tier: backend
        annotations:
          summary: "API 错误率过高"
          description: "5xx 错误率超过 5%，当前 {{ $value | humanizePercentage }}，实例 {{ $labels.instance }}。"

      - alert: HighLatency
        expr: histogram_quantile(0.95, rate(http_server_requests_seconds_bucket[5m])) > 2
        for: 5m
        labels:
          severity: warning
          priority: P1
          tier: backend
        annotations:
          summary: "API P95 延迟过高"
          description: "P95 延迟 {{ $value }}s 超过 2s 阈值，实例 {{ $labels.instance }}。"

      - alert: HikariPoolExhausted
        expr: hikaricp_connections_active / hikaricp_connections_max > 0.9
        for: 3m
        labels:
          severity: warning
          priority: P1
          tier: database
        annotations:
          summary: "HikariCP 连接池即将耗尽"
          description: "活跃连接数 {{ $value | humanizePercentage }}，实例 {{ $labels.instance }}。"

      - alert: PostgresActiveConnectionsHigh
        expr: pg_stat_database_numbackends > 80
        for: 5m
        labels:
          severity: warning
          priority: P1
          tier: database
        annotations:
          summary: "PostgreSQL 活跃连接数过高"
          description: "活跃连接数 {{ $value }} 超过 80 阈值。"

      - alert: RedisMemoryHigh
        expr: redis_memory_used_bytes / redis_memory_max_bytes > 0.85 and redis_memory_max_bytes > 0
        for: 5m
        labels:
          severity: warning
          priority: P1
          tier: cache
        annotations:
          summary: "Redis 内存使用率过高"
          description: "内存使用率 {{ $value | humanizePercentage }}，实例 {{ $labels.instance }}。"

      # ═══════════════════════════════════════════════
      # P2 · 一般 (7d SLA) — 性能劣化趋势
      # ═══════════════════════════════════════════════

      - alert: SlowQueryDetected
        expr: histogram_quantile(0.99, rate(http_server_requests_seconds_bucket[10m])) > 3
        for: 10m
        labels:
          severity: info
          priority: P2
          tier: backend
        annotations:
          summary: "慢查询趋势"
          description: "P99 延迟 {{ $value }}s 持续超过 3s，可能存在慢查询。"

      - alert: DiskSpaceLow
        expr: (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) < 0.1
        for: 10m
        labels:
          severity: info
          priority: P2
          tier: host
        annotations:
          summary: "磁盘空间不足"
          description: "磁盘可用空间低于 10%，当前 {{ $value | humanizePercentage }}。"

      - alert: JvmMemoryHigh
        expr: sum(jvm_memory_used_bytes{area="heap"}) / sum(jvm_memory_max_bytes{area="heap"}) > 0.85
        for: 10m
        labels:
          severity: info
          priority: P2
          tier: backend
        annotations:
          summary: "JVM 堆内存使用率高"
          description: "堆内存使用率 {{ $value | humanizePercentage }}，实例 {{ $labels.instance }}。"

      - alert: PostgresSlowQueries
        expr: rate(pg_stat_database_xact_commit[5m]) > 1000
        for: 10m
        labels:
          severity: info
          priority: P2
          tier: database
        annotations:
          summary: "PostgreSQL 事务量异常"
          description: "事务速率 {{ $value }}/s 超过 1000/s。"

      # ═══════════════════════════════════════════════
      # P3 · 信息 (30d SLA) — 容量预警
      # ═══════════════════════════════════════════════

      - alert: PostgresReplicationLag
        expr: pg_stat_replication_pg_wal_lsn_diff > 10485760
        for: 30m
        labels:
          severity: info
          priority: P3
          tier: database
        annotations:
          summary: "PostgreSQL 复制延迟"
          description: "WAL 复制延迟 {{ $value }} bytes。"

      - alert: RedisConnectionHigh
        expr: redis_connected_clients > 100
        for: 30m
        labels:
          severity: info
          priority: P3
          tier: cache
        annotations:
          summary: "Redis 客户端连接数过高"
          description: "连接数 {{ $value }} 超过 100。"

      - alert: CpuUsageHigh
        expr: 100 - (avg(rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
        for: 30m
        labels:
          severity: info
          priority: P3
          tier: host
        annotations:
          summary: "CPU 使用率持续偏高"
          description: "CPU 使用率 {{ $value }}%，持续 30 分钟以上。"

      - alert: PrometheusTargetDown
        expr: up == 0
        for: 5m
        labels:
          severity: warning
          priority: P1
          tier: monitoring
        annotations:
          summary: "监控目标不可达"
          description: "{{ $labels.job }} ({{ $labels.instance }}) 已 down。"

  # ═══════════════════════════════════════════════
  # P1 plan Task 14: 域事件 outbox 监控 (双向同步健康度)
  # 通过 microcourse_api 进程内 Spring Boot Actuator 暴露的
  # 自定义 Counter / Gauge (见 com.microcourse.event.OutboxMetrics),
  # 用 PromQL 表达式 (不用 SQL — Prometheus 不支持 SQL).
  # ═══════════════════════════════════════════════

  - name: domain-event-outbox
    rules:
      - alert: DomainEventOutboxPendingTooLong
        expr: microcourse_outbox_pending_total > 0
        for: 5m
        labels:
          severity: warning
          priority: P1
          tier: integration
        annotations:
          summary: "outbox PENDING 事件 > 0 持续 5 分钟"
          description: "本地 → Hermes 推送可能不健康 (Hermes 不可达 / API Key 错 / 网络分区)。runbook: 检查 outbox worker 日志 / 验证 hermes.base-url + api-key."

      - alert: DomainEventOutboxRetryStuck
        expr: microcourse_outbox_retry_total > 0
        for: 10m
        labels:
          severity: warning
          priority: P1
          tier: integration
        annotations:
          summary: "outbox 重试事件 > 0 持续 10 分钟"
          description: "长期重试事件可能因 Hermes 端 schema 变更或鉴权失败. 检查死信表."

      - alert: DomainEventDeadLetterNonEmpty
        expr: microcourse_dead_letter_unacked > 0
        for: 5m
        labels:
          severity: warning
          priority: P1
          tier: integration
        annotations:
          summary: "死信表未 ack 事件 > 0 持续 5 分钟"
          description: "人工 ack 前需先排查 last_error. runbook: SELECT event_id, last_error, failed_at FROM domain_event_dead_letter WHERE acknowledged_at IS NULL ORDER BY failed_at DESC LIMIT 10;"

      - alert: DomainEventDeadLetterHigh
        expr: microcourse_dead_letter_unacked > 100
        for: 30m
        labels:
          severity: critical
          priority: P0
          tier: integration
        annotations:
          summary: "死信表未 ack 事件 > 100 持续 30 分钟"
          description: "P1 治理事件, 触发 P0-above 升级. 可能影响 P1 UX 铁律 (Spec §4.2 双向同步)."

      - alert: DomainEventDedupHitHigh
        expr: microcourse_dedup_hermes_total > 0
        for: 30m
        labels:
          severity: info
          priority: P2
          tier: integration
        annotations:
          summary: "Hermes 反推 dedup 命中 (15min)"
          description: "信息级, 用于观察 Hermes 反推幂等性, 验证双向同步去重生效"
