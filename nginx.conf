# ==============================================================================
# http 上下文指令（修复：limit_req_zone / upstream 必须位于 http 上下文，
# 原误置于 server{} 块内会导致 nginx 启动失败 "directive is not allowed here"。
# 本文件被 COPY 到 /etc/nginx/conf.d/default.conf，由主 nginx.conf 的
# http { include conf.d/*.conf; } 包裹，故此处即 http 上下文。）
# ==============================================================================

# Rate limiting (INFRA-NEW-3: 登录端点 5r/m 防暴力破解)
limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;

# Upstream API
upstream api_backend {
    server api:8080 max_fails=3 fail_timeout=30s;
    keepalive 64;
}

# ==============================================================================
# HTTPS server (Production: uncomment and configure SSL certificates)
# ------------------------------------------------------------------------------
# 开发环境无法提供真实证书，故默认全部注释；部署到生产时：
#   1) 将证书/私钥挂载到 /etc/nginx/ssl/ 下（cert.pem / key.pem）；
#   2) 取消下方 server 块注释，并将上面 `server { listen 80; }` 中的
#      `return 301 https://$host$request_uri;` 取消注释以启用 HTTP→HTTPS 跳转；
#   3) 将 location 块（/api/、/api/videos/stream/、/ 等）从 80 端口 server
#      迁移/复制到本 443 server 中（或用 include 抽取公共 location 片段）。
#
# server {
#     listen 443 ssl http2;
#     server_name _;
#
#     ssl_certificate     /etc/nginx/ssl/cert.pem;
#     ssl_certificate_key /etc/nginx/ssl/key.pem;
#     ssl_protocols       TLSv1.2 TLSv1.3;
#     ssl_ciphers         HIGH:!aNULL:!MD5;
#     ssl_prefer_server_ciphers on;
#     ssl_session_cache   shared:SSL:10m;
#     ssl_session_timeout 10m;
#
#     # HSTS 仅在 HTTPS 下生效（见 80 端口 server 内说明），此处保留完整安全头：
#     add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
#     add_header X-Content-Type-Options "nosniff" always;
#
#     # ... 将 80 端口 server 内的 location /api/ 、/api/videos/stream/ 、/ 等
#     #     反向代理与静态资源块复制到此处 ...
# }
# ==============================================================================

server {
    listen 80;

    # HTTP → HTTPS redirect for production
    # 部署启用 HTTPS（443 server）后取消下行注释，将全部明文流量 301 跳转至 HTTPS。
    # 开发环境默认关闭，避免本地无证书时无法访问。
    # return 301 https://$host$request_uri;

    # Security headers (INFRA-NEW-1/2: 添加 CSP/HSTS; X-Frame-Options 由后端控制)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
    # P1-5（Round 5）：CSP 与后端 SecurityConfig 对账一致；放行前端实测合法资源
    # （Google Fonts 样式表/字体、hls.js blob worker/media、blob 图片预览）。
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob: https:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https://api.deepseek.com ws: wss:; media-src 'self' blob: https:; frame-src 'self'; worker-src 'self' blob:; object-src 'none'; base-uri 'self'; form-action 'self'" always;
    # Strict-Transport-Security: 仅在 HTTPS 连接下由浏览器生效（HTTP 明文响应中浏览器会忽略本头）。
    # 当前 80 端口为开发/未启用 TLS 场景，本头保留以便部署在 TLS 终止层（443 server / 上游 LB）后立即生效。
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Gzip (INFRA-NEW-5)
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 256;
    gzip_vary on;

    # ==========================================================================
    # P0-10-d 修复：HLS 视频防盗链（边缘层加固）
    # --------------------------------------------------------------------------
    # 架构说明（务必阅读，避免误改导致合法用户视频 403）：
    #   后端 VideoSignUtil 使用 JWT(HMAC-SHA256) 生成播放签名，并由
    #   VideoController#play (/api/videos/{id}/play?sign=<JWT>) 在 Java 层验证；
    #   真正的 HLS 分片（.m3u8 / .ts）由 VideoStreamController
    #   (/api/videos/stream/{courseId}/{videoId}/{filename}) 提供，受 Spring
    #   Security @PreAuthorize("isAuthenticated()") 保护（无 JWT Bearer → 401）。
    #
    #   ⚠️ hls.js 自动发起的 .m3u8 / .ts 分片请求【不携带 sign 参数】，因此
    #   不能在本路径启用 nginx secure_link_md5（其算法为 base64(md5(secret+exp))，
    #   与后端 JWT 数学上不兼容），否则【所有合法用户视频播放会被 403/瘫痪】。
    #
    #   本块采用与现有架构兼容、不破坏 hls.js 的纵深防盗链：
    #     1) valid_referers —— 拒绝来自外部站点的盗链/嗅探直连；
    #        同源前端（hls.js）请求带本站 Referer 或无 Referer 时放行。
    #     2) proxy_pass 回后端 —— 保留 isAuthenticated() 作为主防线（无凭证 → 401）。
    #
    #   若未来后端改为 md5 签名（VideoSignUtil 输出 secure_link 兼容格式，
    #   且 hls.js 通过 xhrSetup 给每个分片 URL 追加 &sign=&exp=），可启用文件
    #   末尾被注释的 secure_link_md5 模板（与 VIDEO_SIGN_SECRET 对齐）。
    # ==========================================================================
    location /api/videos/stream/ {
        # 防盗链：仅拒绝明确来自外部域名的 Referer；
        # none（无 Referer）/ blocked（被代理删除）/ 本站域名 → 放行，确保合法用户零感
        valid_referers none blocked server_names "~^https?://$host";
        if ($invalid_referer) {
            return 403;
        }

        proxy_pass http://api_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_connect_timeout 30s;

        # HLS 流媒体头（保持播放体验不变）
        add_header Cache-Control "no-cache" always;
    }

    # API reverse proxy
    location /api/ {
        proxy_pass http://api_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_connect_timeout 30s;
        client_max_body_size 2G;
    }

    # Login rate limiting (separate block to avoid conflict with /api/)
    location /api/auth/login {
        limit_req zone=login burst=10 nodelay;
        proxy_pass http://api_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Frontend static files
    location / {
        root /usr/share/nginx/html;
        try_files $uri /index.html;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ==========================================================================
    # P0-10-d · secure_link_md5 模板（默认禁用，spec 8.3 形式参考）
    # --------------------------------------------------------------------------
    # 当前【未启用】：后端 VideoSignUtil 采用 JWT(HMAC-SHA256) 而非 md5 签名，
    # 且 hls.js 分片请求不带 sign/exp 参数，启用以下配置会导致合法用户视频 403。
    #
    # 启用前置条件（未来工作，需后端配合，不在本次 UX-零退化范围内）：
    #   1. VideoSignUtil 改为输出 secure_link 兼容签名：
    #        sign = base64url( md5( "<VIDEO_SIGN_SECRET><uri> <exp>" ) )
    #   2. hls.js 通过 xhrSetup 给每个 .m3u8/.ts 分片 URL 追加 ?sign=&exp=
    #   3. VIDEO_SIGN_SECRET 在 nginx 与后端 application.yml(video.sign.secret) 保持一致
    #
    #   location /api/videos/stream/ {
    #       secure_link        $arg_sign,$arg_exp;
    #       secure_link_md5    "$secret_video_sign$uri $arg_exp";
    #       if ($secure_link = "")  { return 403; }   # 签名非法
    #       if ($secure_link = "0") { return 410; }   # 签名过期
    #       proxy_pass http://api_backend;
    #   }
    #   # $secret_video_sign 由部署时注入（envsubst / map），对应 VIDEO_SIGN_SECRET
    # ==========================================================================
}
