<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>2.2 数据分析Prompt模板库</title>
<style>*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#f5f3ef;color:#1a1a1a;font-family:-apple-system,'Helvetica Neue','PingFang SC','Microsoft YaHei','Noto Sans SC',system-ui,sans-serif}
.slides-container{width:100%;height:100%;display:flex;flex-direction:column}
.slide{display:none;width:100%;flex:1;overflow-y:auto;background:#f5f3ef}.slide.active{display:flex;flex-direction:column}
.slide-inner{flex:1;padding:5% 8% 12%;max-width:1100px;margin:0 auto;width:100%}
.meta{font-size:clamp(11px,1vw,16px);color:#6e6e6e;margin-bottom:6px}
h1{font-size:clamp(26px,4vw,56px);font-weight:700;line-height:1.2;margin-bottom:8px}
h2{font-size:clamp(20px,2.8vw,40px);font-weight:600;line-height:1.25;margin-bottom:8px}
p{font-size:clamp(14px,1.5vw,24px);line-height:1.7;color:#5c5c5c;margin-bottom:10px}
p strong{color:#1a1a1a}
pre{background:#1a1a1a;color:#e8e7e3;padding:12px 14px;border-radius:4px;font-size:clamp(12px,1.1vw,16px);line-height:1.5;overflow-x:auto;font-family:monospace;margin-bottom:10px;white-space:pre-wrap}
.slide-title{background:#fff;position:relative}.slide-title::before{content:'';position:absolute;top:0;left:0;right:0;height:clamp(5px,.6vh,10px);background:#b83f2a;z-index:3}
.slide-title .slide-inner{justify-content:center;padding-top:clamp(6%,8vh,10%)}.slide-title h1{font-size:clamp(30px,4.5vw,60px)}
.slide-title .sub{font-size:clamp(15px,1.6vw,26px);color:#5c5c5c;max-width:80%}
.slide-title .tags{margin-top:14px;display:flex;gap:8px;flex-wrap:wrap}.slide-title .tag{padding:4px 8px;border-radius:12px;font-size:clamp(11px,1vw,16px)}
.slide-title .tag.gray{background:#f0eeeb;color:#5c5c5c}.slide-title .tag.accent{background:rgba(184,63,42,.1);color:#b83f2a}
.slide-title .accent-bar{width:3px;height:clamp(40px,4vh,70px);background:#b83f2a;border-radius:2px;margin-bottom:12px}
.slide-summary{background:#f0eeeb}
.cg{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px;margin:10px 0}
.c{background:#fff;border:1px solid #dddcd7;border-radius:4px;padding:16px}.c h4{font-size:clamp(13px,1.3vw,18px);font-weight:600;margin-bottom:6px}.c p{font-size:clamp(12px,1.1vw,16px);margin-bottom:0}
.co{padding:12px 14px;border-radius:4px;margin:10px 0;border-left:3px solid;font-size:clamp(13px,1.2vw,18px);line-height:1.5}
.co-t{background:#f0eeeb;border-color:#b83f2a}.co strong{color:#b83f2a}
.compare-split{display:grid;grid-template-columns:45fr 55fr;gap:12px;margin:12px 0}
.compare-side{border-radius:4px;padding:14px}.compare-side.o{background:#f7f5f2;border:1px solid #e8e7e3}.compare-side.n{background:#fff;border:1.5px solid #b83f2a;box-shadow:0 2px 10px rgba(184,63,42,.08)}
.compare-side .b{display:inline-block;padding:3px 8px;border-radius:12px;font-size:11px;font-weight:600;margin-bottom:10px}
.compare-side.o .b{background:#e8e7e3;color:#5c5c5c}.compare-side.n .b{background:#b83f2a;color:#fff}
.compare-side .r{padding:6px 0;border-bottom:1px solid #f0eeeb;font-size:clamp(12px,1.1vw,16px);color:#5c5c5c}
.flip{background:#fff;border:1px solid #dddcd7;border-radius:4px;padding:16px;cursor:pointer;margin:10px 0}
.flip .h{font-size:12px;color:#a39e98;text-align:right}.flip .a{display:none;margin-top:10px;padding:10px;background:rgba(184,63,42,.06);border-left:3px solid #b83f2a;border-radius:4px;font-size:clamp(12px,1.1vw,16px);color:#5c5c5c;line-height:1.5}
.flip.s .a{display:block}.flip.s .h{display:none}
.schk{margin:14px 0;padding:16px;background:#fff;border:1.5px solid #dddcd7;border-radius:4px}
.schk .q{font-size:clamp(14px,1.3vw,20px);font-weight:550;margin-bottom:12px}.schk .os{display:flex;flex-direction:column;gap:6px}
.schk .o{padding:10px 14px;border:1.5px solid #dddcd7;border-radius:4px;cursor:pointer;font-size:clamp(13px,1.2vw,18px);color:#5c5c5c}
.schk .o:hover{border-color:#b83f2a}
.schk .o.c{background:rgba(34,197,94,.08);border-color:#22c55e;color:#15803d}.schk .o.w{background:rgba(239,68,68,.06);border-color:#ef4444;color:#b91c1c}
.schk .o .r{display:none;font-size:clamp(11px,1vw,15px);margin-top:6px}.schk .o.c .r,.schk .o.w .r{display:block}
table{width:100%;border-collapse:collapse;margin:10px 0;font-size:clamp(12px,1.1vw,16px)}th{background:#e8e7e3;font-weight:600;padding:10px;text-align:left}td{padding:10px;border-bottom:1px solid #e8e7e3;color:#5c5c5c}tr:nth-child(even) td{background:#faf8f6}
.ck{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid #dddcd7;font-size:clamp(13px,1.3vw,18px);color:#5c5c5c}.ck-i{color:#b83f2a;font-weight:700;flex-shrink:0}
.ac{background:#fff;border:1.5px solid #b83f2a;border-radius:4px;padding:16px;margin-top:14px}.ac h4{font-size:clamp(14px,1.3vw,20px);font-weight:600;margin-bottom:6px}.ac p{font-size:clamp(12px,1.1vw,16px);margin-bottom:0}
.steps{counter-reset:step;margin:12px 0}
.step{counter-increment:step;padding:12px 0 12px 40px;position:relative;border-left:2px solid #e8e7e3;margin-left:12px}
.step:last-child{border-left-color:transparent}.step::before{content:counter(step);position:absolute;left:-12px;top:12px;width:24px;height:24px;border-radius:50%;background:#b83f2a;color:#fff;font-size:13px;font-weight:600;display:flex;align-items:center;justify-content:center}
.step .st{font-size:clamp(14px,1.3vw,20px);font-weight:550;margin-bottom:4px}.step .sd{font-size:clamp(12px,1.1vw,16px);color:#5c5c5c;line-height:1.5}
.hd{display:flex;flex-direction:column;margin:14px 0;padding-left:28px}
.hl{position:relative;padding:12px 16px;border-left:3px solid;min-height:60px;display:flex;flex-direction:column;justify-content:center}
.hl:first-child{border-left-color:#b83f2a;background:#faf8f6}.hl:nth-child(2){border-left-color:#9a8a80;background:#f8f7f5}.hl:nth-child(3){border-left-color:#6e6e6e;background:#f5f4f2}
.hl:not(:last-child)::after{content:'';position:absolute;bottom:-10px;left:-5px;width:9px;height:9px;border-right:2px solid #b83f2a;border-bottom:2px solid #b83f2a;transform:rotate(45deg)}
.hl .hn{font-size:clamp(14px,1.4vw,22px);font-weight:600}.hl .hd{font-size:clamp(12px,1.1vw,16px);color:#5c5c5c;line-height:1.5;margin-top:3px}
.tc{position:fixed;top:0;left:0;right:0;height:clamp(30px,3vh,44px);background:#f5f3ef;border-bottom:1px solid #dddcd7;display:flex;align-items:center;justify-content:center;z-index:100;gap:5px}
.tc .pd{display:inline-block;width:clamp(6px,.5vw,10px);height:clamp(6px,.5vw,10px);border-radius:50%;background:#dddcd7;cursor:pointer}.tc .pd.a{background:#b83f2a;width:clamp(16px,1.5vw,26px);border-radius:4px}
.bn{position:fixed;bottom:0;left:0;right:0;height:clamp(44px,4.5vh,60px);background:#fff;border-top:1px solid #dddcd7;display:flex;align-items:center;justify-content:space-between;padding:0 clamp(12px,1.2vw,24px);z-index:100}
.bn .pn{font-size:clamp(12px,1.1vw,16px);color:#6e6e6e}.nb{display:inline-flex;gap:4px;padding:clamp(6px,.6vh,10px) clamp(12px,1.2vw,22px);border:1px solid #dddcd7;border-radius:4px;background:#fff;color:#5c5c5c;font-size:clamp(12px,1.1vw,18px);cursor:pointer;font-family:inherit}
.nb:disabled{opacity:.3}.nb.pr{background:#b83f2a;color:#fff;border-color:#b83f2a}
@media(max-width:600px){.slide-inner{padding:8% 6% 18%}.compare-split,.cg{grid-template-columns:1fr}}
</style></head><body>
<div class="tc" id="tc"></div><div class="slides-container" id="app"></div>
<div class="bn"><button class="nb" id="pb">&larr;上一页</button><div class="pn"><strong id="pn">1</strong>/<strong id="tp">10</strong></div><button class="nb pr" id="nx">下一页&rarr;</button></div>
<script>
(function(){var T=10,cur=0,pt='lllllllpll';
var s=['<div class="slide-inner"><div class="accent-bar"></div><p class="meta">第2章 Prompt工程</p><h1>数据分析Prompt模板库</h1><p class="sub">4类12模板覆盖9成场景</p><div class="tags"><span class="tag gray">⏱15min</span><span class="tag accent">12模板</span></div></div>',
'<div class="slide-inner"><p class="meta">学习目标</p><h2>学完你将能</h2><div class="ck"><span class="ck-i">✓</span>套用模板写出结构完整的数据分析Prompt</div><div class="ck"><span class="ck-i">✓</span>选择合适模板匹配不同分析任务</div><div class="ck"><span class="ck-i">✓</span>自定义模板适配自己业务场景</div></div>',
'<div class="slide-inner"><p class="meta">设计思路</p><h2>4类场景</h2><div class="cg"><div class="c"><h4>描述分析</h4><p>发生了什么。销售月报流量周报。关键词：汇总对比趋势排名。</p></div><div class="c"><h4>诊断分析</h4><p>为什么发生。业绩下滑归因活动评估。关键词：原因异常归因贡献度。</p></div><div class="c"><h4>预测分析</h4><p>会发生什么。销售预测库存预警。关键词：预测趋势置信区间。</p></div><div class="c"><h4>决策分析</h4><p>该怎么办。促销策略定价建议。关键词：方案对比ROI建议。</p></div></div></div>',
'<div class="slide-inner"><p class="meta">模板1</p><h2>描述分析模板</h2><pre>你是商业数据分析师。请分析附件中的数据：1.汇总总体情况（总量均值增长率）2.按XX维度拆分找前3和后3。数据字段：日期产品区域销量金额。要求：用中文不编数据用表格输出。</pre><div class="co co-t">把XX替换成你的业务维度直接发给AI。</div></div>',
'<div class="slide-inner"><p class="meta">模板2</p><h2>诊断分析模板</h2><pre>你是一个数据分析师。分析XX指标同比下降的原因。数据包含字段ABCD。请：1.计算各维度贡献度 2.标记异常值 3.按影响力给TOP3原因。输出为表格。注意只基于已有数据不编造原因。</pre><div class="co co-t">增加了贡献度计算和异常排除。不是简单对比是找原因。</div></div>',
'<div class="slide-inner"><p class="meta">模板3</p><h2>预测+决策模板</h2><pre>你是高级数据分析师。基于过去12个月数据预测下季度X指标走势。数据字段：日期销售额用户数转化率。请：1.用时间序列模型预测未来3个月 2.给出置信区间 3.根据预测提运营建议。输出图表+建议列表。解释预测逻辑标注不确定性。</pre></div>',
'<div class="slide-inner"><p class="meta">使用技巧</p><h2>模板不是死搬硬套</h2><div class="steps"><div class="step"><div class="st">先选类再套用</div><div class="sd">确定是描述诊断预测决策中的哪一种。选错模板输出会偏。</div></div><div class="step"><div class="st">填空时加细节</div><div class="sd">加上业务背景比如最近竞品在打价格战AI会结合背景分析。</div></div><div class="step"><div class="st">不满意加约束</div><div class="sd">AI第一次输出不符合预期加一句约束就行不用重写整个Prompt。</div></div></div></div>',
'<div class="slide-inner"><p class="meta">练习</p><h2>动手套用一次</h2><div class="cg"><div class="c"><h4>1.评分</h4><p>AI输出能用吗？打1-5分。不能用缺了什么加约束再试一次。</p></div><div class="c"><h4>2.改模板</h4><p>根据你的业务场景改。电商有SKU层零售有门店层把行业术语加进去。</p></div></div><div class="co co-t">经过3次迭代建立自己的个人模板库。</div></div>',
'<div class="slide-inner"><p class="meta">速查表</p><h2>4类12模板</h2><table><tr><th>类</th><th>模板</th><th>说明</th></tr><tr><td rowspan="3">描述</td><td>销售总览</td><td>汇总销量金额增长率排名</td></tr><tr><td>流量分析</td><td>PV/UV/转化率趋势渠道对比</td></tr><tr><td>结构分析</td><td>品类区域客群占比变化</td></tr><tr><td rowspan="3">诊断</td><td>下降归因</td><td>贡献度异常排除TOP3原因</td></tr><tr><td>活动复盘</td><td>活动vs非活动ROI用户留存</td></tr><tr><td>流失分析</td><td>流失用户特征行为差异</td></tr><tr><td rowspan="3">预测</td><td>销量预测</td><td>时间序列置信区间</td></tr><tr><td>库存预警</td><td>安全库存补货建议</td></tr><tr><td>用户增长</td><td>增长率预测拐点</td></tr><tr><td rowspan="3">决策</td><td>促销策略</td><td>折扣力度对比ROI</td></tr><tr><td>定价建议</td><td>价格弹性利润最大化</td></tr><tr><td>资源分配</td><td>投入产出比优先级</td></tr></table></div>',
'<div class="slide-inner"><p class="meta">小结</p><h2>核心要点</h2><div class="ck"><span class="ck-i">✓</span>4类任务：描述诊断预测决策</div><div class="ck"><span class="ck-i">✓</span>填空加业务背景AI输出更贴合</div><div class="ck"><span class="ck-i">✓</span>不满意加约束不用重写整个Prompt</div><div class="ac"><h4>课后行动</h4><p>选一个模板套用你的真实数据截图保存。</p></div></div>'];
function r(){document.getElementById('app').innerHTML=s.map(function(sl,i){return '<div class="slide'+(i===0?' active':'')+(i===0?' slide-title':i===9?' slide-summary':'')+'">'+sl+'</div>';}).join('');u();b();}
function u(){document.getElementById('pn').textContent=cur+1;document.getElementById('tp').textContent=T;
  var c=document.getElementById('tc');c.innerHTML='';for(var i=0;i<T;i++){var x=document.createElement('span');x.className='pd'+(i===cur?' a':'');x.onclick=(function(idx){return function(){g(idx);};})(i);c.appendChild(x);}
  document.getElementById('pb').disabled=cur===0;document.getElementById('nx').disabled=cur===T-1;}
function b(){document.getElementById('pb').onclick=function(){n(-1);};document.getElementById('nx').onclick=function(){n(1);};
  var qs=[['q1a',false],['q1b',true],['q1c',false]];for(var i=0;i<qs.length;i++){var el=document.getElementById(qs[i][0]);if(el)el.onclick=(function(idx){return function(){cq(this,qs[idx][1]);};})(i);}
  var fc=['f1'];for(var i=0;i<fc.length;i++){var el=document.getElementById(fc[i]);if(el)el.onclick=function(){this.classList.toggle('s');};}}
function n(d){var t=cur+d;if(t>=0&&t<T)g(t);}
function g(t){if(t===cur)return;var a=document.querySelectorAll('.slide');for(var i=0;i<a.length;i++)a[i].classList.remove('active');a[t].classList.add('active');cur=t;u();if(pt.charAt(t)=='l'){try{window.parent.postMessage({type:'slide-audio',action:'play'},'*');}catch(e){}}else{try{window.parent.postMessage({type:'slide-audio',action:'pause'},'*');}catch(e){}}}
function cq(el,c){var p=el.parentNode;var o=p.querySelectorAll('.o');for(var i=0;i<o.length;i++)o[i].style.pointerEvents='none';el.classList.add(c?'c':'w');}
window.addEventListener('message',function(e){var m=e.data;if(m&&m.type==='slide-audio-state'&&m.state==='ended'&&pt.charAt(cur)=='l')n(1);});
document.addEventListener('keydown',function(e){if(e.key==='ArrowRight'||e.key===' ' ){e.preventDefault();n(1);}else if(e.key==='ArrowLeft'){e.preventDefault();n(-1);}});
r();})();
</script></body></html>
