# 微课管理平台前端 Nginx 配置
server {
    listen 80;
    server_name localhost;

    # 前端静态文件
    root /usr/share/nginx/html;
    index index.html;

    # Gzip
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml
               application/vnd.apple.mpegurl video/mp2t;
    gzip_min_length 256;

    # 视频上传大文件支持
    client_max_body_size 2g;

    # SPA 路由: 所有非文件请求返回 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API 反向代理
    location /api/ {
        proxy_pass http://api:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 超时（视频上传需要更长超时）
        proxy_connect_timeout 60s;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # P1-9: HLS 视频流 — 防盗链 + 缓存策略
    location /api/videos/stream/ {
        proxy_pass http://api:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # 防盗链：仅允许本站 Referer（空 Referer 放行，兼容播放器直接请求）
        valid_referers none blocked server_names *.localhost;
        if ($invalid_referer) {
            return 403;
        }

        # m3u8 不缓存，ts 分片缓存 1 天
        add_header Cache-Control "no-cache";
    }

    # P0-3: 封面文件代理（长期缓存）
    location /api/files/ {
        proxy_pass http://api:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        add_header Cache-Control "public, max-age=604800";
    }

    # 安全头
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; media-src 'self' blob:;";
}
