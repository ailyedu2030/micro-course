limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=login:10m rate=5r/s;

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 2G;
    client_body_timeout 60s;
    client_header_timeout 30s;
    send_timeout 30s;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript image/svg+xml application/vnd.apple.mpegurl video/mp2t;
    gzip_min_length 1024;
    gzip_vary on;
    gzip_proxied any;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, must-revalidate";
    }

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location /api/auth/login {
        limit_req zone=login burst=10 nodelay;
        proxy_pass http://micro-course-api:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 10s;
    }

    location /api/ {
        limit_req zone=api burst=50 nodelay;

        proxy_pass http://micro-course-api:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;

        proxy_buffering on;
        proxy_buffer_size 8k;
        proxy_buffers 8 8k;

        proxy_next_upstream error timeout invalid_header http_500 http_502 http_503;
        proxy_next_upstream_tries 2;
    }

    location /health {
        access_log off;
        proxy_pass http://micro-course-api:8080/api/admin/stats/health;
        proxy_read_timeout 5s;
    }

    location /favicon.ico {
        access_log off;
        expires 30d;
    }

    error_page 429 @rate_limit;
    location @rate_limit {
        default_type application/json;
        return 429 '{"code":1429,"message":"请求过于频繁，请稍后重试","data":null}';
    }

    error_page 502 503 504 @server_error;
    location @server_error {
        default_type application/json;
        return 503 '{"code":1503,"message":"服务暂不可用，请稍后重试","data":null}';
    }
}
