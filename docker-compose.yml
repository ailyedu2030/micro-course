# =============================================================================
# docker-compose.yml · 微课平台 Phase 1 基础设施
# -----------------------------------------------------------------------------
# 容器：PostgreSQL 16 + Redis 7 + Adminer（PG Web 客户端）
# 用途：本地开发 & Flyway 集成测试
# 启动：docker compose -p micro-course up -d
# 停止：docker compose -p micro-course down
# 重置：docker compose -p micro-course down -v（删数据卷）
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL 16（主数据库）
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: micro-course-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: micro_course
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      TZ: Asia/Shanghai
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d micro_course"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - micro-course-net

  # ---------------------------------------------------------------------------
  # Redis 7（登录失败计数 + Token 黑名单）
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: micro-course-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - micro-course-net

  # ---------------------------------------------------------------------------
  # Adminer（PG Web 客户端，可选）
  # ---------------------------------------------------------------------------
  adminer:
    image: adminer:latest
    container_name: micro-course-adminer
    restart: unless-stopped
    ports:
      - "8081:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - micro-course-net

volumes:
  pg_data:
    name: micro-course-pg-data
  redis_data:
    name: micro-course-redis-data

networks:
  micro-course-net:
    name: micro-course-net
    driver: bridge
