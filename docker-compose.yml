name: micro-course

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: micro_course
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    shm_size: 256mb
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d micro_course"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    # 修复 P0 配置残缺: 当 REDIS_PASSWORD 未设时不能传空字符串给 --requirepass (会触发 "wrong number of arguments" 死循环重启)
    # 改用条件式: 有密码时附加 --requirepass, 无密码时不附加
    command: >
      sh -c "
        if [ -n \"$$REDIS_PASSWORD\" ]; then
          exec redis-server --requirepass \"$$REDIS_PASSWORD\"
        else
          exec redis-server
        fi
      "
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  micro-course-api:
    build:
      context: ./micro-course-api
      dockerfile: Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:postgresql://postgres:5432/micro_course
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-7200000}
      JWT_REFRESH_EXPIRATION: ${JWT_REFRESH_EXPIRATION:-604800000}
      VIDEO_SIGN_SECRET: ${VIDEO_SIGN_SECRET}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:80,http://127.0.0.1:80}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      MINIMAX_API_KEY: ${MINIMAX_API_KEY}
      PROD_ALLOW_MOCK_PAYMENT: ${PROD_ALLOW_MOCK_PAYMENT:-false}
    volumes:
      - uploads_data:/app/uploads
      - slides_data:/data/slides
      - multipart_tmp:/data/uploads/tmp
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s
    restart: unless-stopped

  micro-course-admin:
    build:
      context: ./micro-course-admin
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - micro-course-api
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

  uploads_data:
  slides_data:
  multipart_tmp:
