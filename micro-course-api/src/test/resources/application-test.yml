spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/micro_course_test
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  redis:
    host: localhost
    port: 6380
    password:
    database: 1

jwt:
  secret: test-secret-key-for-integration-tests-must-be-at-least-32-chars
  expiration: 7200000
  refresh-expiration: 604800000

logging:
  level:
    com.microcourse: warn
