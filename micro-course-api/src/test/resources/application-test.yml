spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.oauth2.client.servlet.OAuth2ClientAutoConfiguration
      - org.springframework.boot.autoconfigure.security.oauth2.resource.servlet.OAuth2ResourceServerAutoConfiguration
  datasource:
    url: ${TEST_DB_URL:jdbc:postgresql://localhost:5433/micro_course_test}
    username: postgres
    password: ${TEST_DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      # P1-CI: 限制测试环境连接池大小,避免 250 上限耗尽 PG max_connections=100
      # P1-I-6 修复（CI 卡死根因）: 提升到 20 避免 @Sql 直接 JDBC 借连接未归还导致池满
      maximum-pool-size: 20
      minimum-idle: 2
      pool-name: micro-course-test-pool
      auto-commit: true
      # 60s 泄漏超时（避免 housekeeper 误报为死锁）
      leak-detection-threshold: 60000
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    validate-on-migrate: false

  redis:
    host: ${TEST_REDIS_HOST:localhost}
    port: ${TEST_REDIS_PORT:6380}

jwt:
  secret: test-secret-key-for-integration-tests-must-be-at-least-32-chars
  expiration: 7200000
  refresh-expiration: 604800000

video:
  sign:
    secret: test-secret-key-for-integration-tests-must-be-at-least-32-chars

plugin:
  interactive:
    deepseek:
      api-key: test-deepseek-api-key-for-tests

logging:
  level:
    com.microcourse: warn
    org.flywaydb: debug
