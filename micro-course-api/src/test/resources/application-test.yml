spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  flyway:
    enabled: false
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: false
    defer-datasource-initialization: true
  sql:
    init:
      mode: always
  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 1

jwt:
  secret: test-secret-key-for-integration-tests-must-be-at-least-32-chars
  expiration: 7200000
  refresh-expiration: 604800000

logging:
  level:
    com.microcourse: warn
    org.hibernate: warn