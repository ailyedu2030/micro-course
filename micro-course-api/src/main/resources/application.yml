server:
  port: 8080

spring:
  application:
    name: micro-course-api

  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${DB_URL:jdbc:postgresql://localhost:5432/micro_course}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      # P3-14 连接池监控：pool-name 作为 Micrometer hikaricp_* 指标的 pool 标签，便于多池区分
      pool-name: micro-course-pool
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 300000
      max-lifetime: 1800000
      # ★ Round 9-2 修复：连接池满时 30s 等待对用户是灾难，降至 5s 快速失败
      connection-timeout: 5000
      # ★ Round 9-2 修复：60s 连接泄漏检测，及时暴露未归还连接
      leak-detection-threshold: 60000
      # ★ Round 9-2 修复：获取连接前校验超时 3s
      validation-timeout: 3000

  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 72
    locations: classpath:db/migration
    table: flyway_schema_history

  # Redis 7（Docker 容器，6379）—— 登录失败计数 + Token 黑名单
  # 依据：业务逻辑 §2.1（login:lock:{username}）+ §2.4（登出黑名单）
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD}
      database: ${REDIS_DB:0}
      timeout: 2000ms
      lettuce:
        pool:
          enabled: true
          max-active: 16
          max-idle: 8
          min-idle: 2
          max-wait: 1000ms

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false

  # 文件上传：最大 2GB（P0: 之前错误地放在 springdoc: 下，导致 Spring Boot 使用默认 1MB）
  servlet:
    multipart:
      max-file-size: 2GB
      max-request-size: 2GB

  # 静态资源映射 - 头像文件 + 封面文件访问
  web:
    resources:
      static-locations: classpath:/static/,file:./uploads/
      add-mappings: true

  mvc:
    throw-exception-if-no-handler-found: true

mybatis-plus:
  mapper-locations: classpath:mapper/**/*.xml
  global-config:
    logic-delete-field: deletedAt
    logic-delete-value: now()
    logic-not-delete-value: null
  configuration:
    map-underscore-to-camel-case: true
    # log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

jwt:
  secret: ${JWT_SECRET}
  # 生产建议: JWT_EXPIRATION=1800000(30分), refresh=604800000(7天)
  expiration: ${JWT_EXPIRATION:7200000}
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}

# P1-1/P1-5: 视频存储与转码配置（从硬编码抽取）
video:
  storage-base-dir: ${VIDEO_STORAGE_BASE_DIR:uploads/videos}
  upload-dir: ${VIDEO_UPLOAD_DIR:uploads/videos}
  cover-dir: ${VIDEO_COVER_DIR:uploads/covers}
  # P1-7: 视频签名独立密钥（不与 JWT 共用）
  # P1 安全：禁止 fallback 到 JWT_SECRET —— 未配置 VIDEO_SIGN_SECRET 时直接启动失败，避免静默复用 JWT 密钥
  sign:
    secret: ${VIDEO_SIGN_SECRET}
  transcode:
    # P1-2: FFmpeg 超时（分钟）可配置
    timeout-minutes: ${VIDEO_TRANSCODE_TIMEOUT:60}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.microcourse: ${LOG_LEVEL:info}
    com.baomidou.mybatisplus: ${LOG_LEVEL:info}
    org.flywaydb: info

# Phase 11: 互动课程插件
plugin:
  interactive:
    enabled: ${PLUGIN_INTERACTIVE_ENABLED:true}
    slides:
      storage-path: ${SLIDES_STORAGE_PATH:uploads/slides}
      page-image-width: 1920
      thumbnail-width: 320
    deepseek:
      api-key: ${DEEPSEEK_API_KEY}
      model: deepseek-chat
      base-url: https://api.deepseek.com
    minimax:
      tts-model: speech-2.8-hd
      tts-voice: Chinese_female_narrator

# CORS (INFRA-NEW-4: 多个来源以逗号分隔,env 可覆盖)
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,http://localhost}

# P3-14 DB 连接池监控：Actuator + Micrometer Prometheus
# 安全：exposure.include 仅白名单 4 个端点，绝不暴露 env/beans/configprops/heapdump/threaddump 等敏感端点。
# 暴露内容为 hikaricp_*/jvm_*/http_* 运行时指标，不含业务数据。生产须在网络层再限制内网可达。
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: never        # 不向匿名访问者泄露下游组件细节（DB/Redis 地址等）
  metrics:
    tags:
      application: micro-course-api
  prometheus:
    metrics:
      export:
        enabled: true

# P3-15 慢 SQL 监控阈值（被 MybatisSlowSqlInterceptor 通过 @Value 读取；独立顶级键，不与 mybatis-plus 绑定冲突）
mybatis:
  slow-sql:
    threshold-ms: ${SLOW_SQL_THRESHOLD_MS:500}   # 500ms 阈值（业务建议，可调整）
    alert-enabled: ${SLOW_SQL_ALERT_ENABLED:true}
