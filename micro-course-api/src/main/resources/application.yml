server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: micro-course-api

  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${DB_URL:jdbc:postgresql://localhost:5432/micro_course}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    hikari:
      # P3-14 连接池监控：pool-name 作为 Micrometer hikaricp_* 指标的 pool 标签，便于多池区分
      pool-name: micro-course-pool
      minimum-idle: 20
      # ★ 业务逻辑审计 P0-1 压测发现：300 并发下 20 连接池耗尽
      # PG max_connections=300，预留 50 给运维/管理连接，app 上限 250
      # ★ E6: maximum-pool-size=250→100（R8 调整：PG default max_connections=100，app 需预留连接给运维）
      #   100 池 + 10 standby = 110，剩余 40 留给 PG 管理员直连
      maximum-pool-size: 100
      idle-timeout: 300000
      max-lifetime: 1800000
      # ★ Round 9-2 修复：连接池满时 30s 等待对用户是灾难，降至 5s 快速失败（feature flag 兜底）
      connection-timeout: 5000
      # ★ Round 9-2 修复：60s 连接泄漏检测，及时暴露未归还连接
      leak-detection-threshold: 60000
      # ★ Round 9-2 修复：获取连接前校验超时 3s
      validation-timeout: 3000

  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 72
    locations: classpath:db/migration
    table: flyway_schema_history
    # Phase 15: V91-V96 是新增 migration，版本号低于已应用的 V99-V103
    # 启用 out-of-order 允许 Flyway 按顺序应用新 migrations
    out-of-order: true

  # Redis 7（Docker 容器，6379）—— 登录失败计数 + Token 黑名单
  # 依据：业务逻辑 §2.1（login:lock:{username}）+ §2.4（登出黑名单）
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DB:0}
      timeout: 2000ms
      lettuce:
        pool:
          enabled: true
          max-active: 16
          max-idle: 8
          min-idle: 2
          max-wait: 1000ms

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false

  # 文件上传：最大 2GB（P0: 之前错误地放在 springdoc: 下，导致 Spring Boot 使用默认 1MB）
  servlet:
    multipart:
      # 视频上传允许最大 500MB (RES-006 修复: 从 2GB 降至 500MB, 限制 DoS 风险)
      max-file-size: 500MB
      max-request-size: 500MB

  # 静态资源映射 - 头像文件 + 封面文件访问
  # P0-09 修复：移除 file:./uploads/ 避免未授权文件访问
  # 上传文件的访问统一通过 WebMvcConfig 的 /api/files/** 受控映射
  web:
    resources:
      static-locations: classpath:/static/
      add-mappings: true

  mvc:
    throw-exception-if-no-handler-found: true

mybatis-plus:
  mapper-locations: classpath:mapper/**/*.xml
  global-config:
    logic-delete-field: deletedAt
    logic-delete-value: now()
    logic-not-delete-value: null
  configuration:
    map-underscore-to-camel-case: true
    # log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

jwt:
  # R8 修复 P0-1: 本地开发允许无 JWT_SECRET（JwtUtil.init 兜底），生产必须显式设置
  secret: ${JWT_SECRET:}
  # 生产建议: JWT_EXPIRATION=1800000(30分), refresh=604800000(7天)
  expiration: ${JWT_EXPIRATION:1800000}
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}

# P1-1/P1-5: 视频存储与转码配置（从硬编码抽取）
video:
  storage-base-dir: ${VIDEO_STORAGE_BASE_DIR:uploads/videos}
  # 统一使用 storage-base-dir，删除 upload-dir（已在 VideoController 中全部迁移到 storage-base-dir）
  cover-dir: ${VIDEO_COVER_DIR:uploads/covers}
  # P1-7: 视频签名独立密钥（不与 JWT 共用）
  # P1 安全：禁止 fallback 到 JWT_SECRET —— 未配置 VIDEO_SIGN_SECRET 时直接启动失败，避免静默复用 JWT 密钥
  sign:
    # R8 修复 P0-1: 本地开发允许无 VIDEO_SIGN_SECRET（VideoSignUtil.init 兜底），生产必须显式设置
    secret: ${VIDEO_SIGN_SECRET:}
  transcode:
    # P1-2: FFmpeg 超时（分钟）可配置
    timeout-minutes: ${VIDEO_TRANSCODE_TIMEOUT:60}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.microcourse: ${LOG_LEVEL:info}
    com.baomidou.mybatisplus: ${LOG_LEVEL:info}
    org.flywaydb: info

# Phase 11: 互动课程插件
plugin:
  interactive:
    enabled: ${PLUGIN_INTERACTIVE_ENABLED:true}
    slides:
      storage-path: ${SLIDES_STORAGE_PATH:uploads/slides}
      page-image-width: 1920
      thumbnail-width: 320
    html-content:
      # 从环境变量注入 max-file-size 和 whitelist-teachers
      max-file-size: ${SLIDES_HTML_MAX_SIZE:5242880}
      whitelist-teachers: ${SLIDES_HTML_WHITELIST:}
    deepseek:
      # LLM 配置（OpenAI 兼容 API）
      # 默认用 DeepSeek 云端，可改用本地 Ollama：
      #   api-key: ollama
      #   model: qwen2.5:7b
      #   base-url: http://localhost:11434/v1
      # R8 修复 P0-1: 本地开发允许无 DeepSeek API key（不调 AI 时不影响）
      api-key: ${LLM_API_KEY:${DEEPSEEK_API_KEY:dev-placeholder-not-used}}
      model: ${LLM_MODEL:deepseek-chat}
      base-url: ${LLM_BASE_URL:https://api.deepseek.com}
    minimax:
      # MiniMax TTS API 配置
      api-key: ${MINIMAX_API_KEY:}
      tts-model: speech-2.8-hd
      # MiniMax TTS 预定义声音 ID：
      #   female-shaonv（甜美少女）, female-qingxin（清新）, female-yujie（御姐）
      #   male-shaonian（少年）, male-qingnian（青年）, male-dashu（大叔）
      #   中文: male-chengzhao（沉稳）, female-warm（温暖）
      tts-voice: ${TTS_VOICE:female-shaonv}
    # TTS 本地服务配置（Qwen3-TTS 0.6B CustomVoice）
    tts:
      local-url: ${TTS_LOCAL_URL:http://127.0.0.1:8000}
      timeout-seconds: ${TTS_TIMEOUT_SECONDS:300}

# J9-01: 支付模式配置 — mock 模式（默认）dev 可用，生产部署时设为 real
payment:
  mode: ${PAY_MODE:mock}   # mock | real
  callback-secret: ${PAYMENT_CALLBACK_SECRET:}  # 支付回调签名密钥

# CORS (INFRA-NEW-4: 多个来源以逗号分隔,env 可覆盖)
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:https://microcourse.ailyedu.cn,http://localhost:5173,http://127.0.0.1:5173,http://localhost}

# P3-14 DB 连接池监控：Actuator + Micrometer Prometheus
# 安全：exposure.include 仅白名单 4 个端点，绝不暴露 env/beans/configprops/heapdump/threaddump 等敏感端点。
# 暴露内容为 hikaricp_*/jvm_*/http_* 运行时指标，不含业务数据。生产须在网络层再限制内网可达。
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: never        # 不向匿名访问者泄露下游组件细节（DB/Redis 地址等）
  metrics:
    tags:
      application: micro-course-api
  prometheus:
    metrics:
      export:
        enabled: true

# P3-15 慢 SQL 监控阈值（被 MybatisSlowSqlInterceptor 通过 @Value 读取；独立顶级键，不与 mybatis-plus 绑定冲突）
upload:
  base-dir: ${UPLOAD_BASE_DIR:uploads}  # 上传根目录（被 @Value("${upload.base-dir:uploads}") 引用）

mybatis:
  slow-sql:
    threshold-ms: ${SLOW_SQL_THRESHOLD_MS:500}   # 500ms 阈值（业务建议，可调整）
    alert-enabled: ${SLOW_SQL_ALERT_ENABLED:true}

# Hermes 课程同步 Webhook 配置
# V2 改造：取消共享 API Key，改为每个教师在个人设置里生成独立 API Key
# 通过 X-API-Key Header 传入，服务端反查 users.api_key 获取教师身份
# （无需服务端配置；详见 UserController /api/users/me/api-key）
