server:
  port: 8080

spring:
  application:
    name: micro-course-api

  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${DB_URL:jdbc:postgresql://localhost:5432/micro_course}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 300000
      max-lifetime: 1800000
      connection-timeout: 30000

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    table: flyway_schema_history

  # Redis 7（Docker 容器，6379）—— 登录失败计数 + Token 黑名单
  # 依据：业务逻辑 §2.1（login:lock:{username}）+ §2.4（登出黑名单）
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DB:0}
      timeout: 2000ms
      lettuce:
        pool:
          enabled: true
          max-active: 16
          max-idle: 8
          min-idle: 2
          max-wait: 1000ms

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false

mybatis-plus:
  mapper-locations: classpath:mapper/**/*.xml
  global-config:
    logic-delete-field: deletedAt
    logic-delete-value: now()
    logic-not-delete-value: null
  configuration:
    map-underscore-to-camel-case: true
    # log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:7200000}
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

  # 视频上传：最大 2GB
  servlet:
    multipart:
      max-file-size: 2GB
      max-request-size: 2GB

  # 静态资源映射 - 头像文件访问
  web:
    resources:
      static-locations: classpath:/static/,file:./uploads/

logging:
  level:
    com.microcourse: ${LOG_LEVEL:info}
    com.baomidou.mybatisplus: ${LOG_LEVEL:info}
    org.flywaydb: info

# CORS (INFRA-NEW-4: 多个来源以逗号分隔,env 可覆盖)
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,http://localhost}
