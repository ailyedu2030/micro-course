logging:
  level:
    com.microcourse: INFO
    org.flywaydb: WARN
    org.springframework.security: WARN

# P1 安全：生产环境禁用 Swagger / OpenAPI 文档，避免接口元数据外泄
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

# E3: CORS 生产配置 — 必须设置 CORS_ALLOWED_ORIGINS 环境变量（多个来源逗号分隔）
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS}

# E4: 支付模式 — 默认 mock；生产部署时必须设置 PAY_MODE=production
payment:
  mode: ${PAY_MODE:mock}
